name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  code-quality:
    name: Code quality (cs:check, phpstan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Coding standards
        run: composer cs:check

      - name: Static analysis
        run: composer phpstan

  tests:
    name: Tests (PHP ${{ matrix.php-version }}, TYPO3 ${{ matrix.typo3-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'
        typo3-version:
          - '^14.3'
        include:
          # TYPO3 core development branch — moving target, allowed to fail.
          - php-version: '8.4'
            typo3-version: 'dev-main'
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: intl, mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Allow development dependencies (TYPO3 main only)
        if: matrix.typo3-version == 'dev-main'
        run: |
          composer config minimum-stability dev
          composer config prefer-stable true
          # Static-analysis tooling is pinned to stable TYPO3 and is not run
          # here; drop it so core main can resolve.
          composer remove --dev --no-update \
            saschaegerer/phpstan-typo3 phpstan/phpstan phpstan/extension-installer typo3/coding-standards
          # Only testing-framework dev-main supports core main (15.x-dev).
          composer require --dev --no-update typo3/testing-framework:dev-main

      - name: Pin TYPO3 core version
        run: composer require --no-update typo3/cms-core:${{ matrix.typo3-version }} typo3/cms-frontend:${{ matrix.typo3-version }} typo3/cms-form:${{ matrix.typo3-version }}

      - name: Install dependencies
        run: composer update --no-progress --with-all-dependencies

      - name: Unit tests
        run: composer test:unit

      - name: Functional tests
        run: composer test:functional
